<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Normalizing</title>
    <link rel="stylesheet" href="/src/renderer/stylesheet/base.css">
    <link rel="stylesheet" href="/src/visualizer/visualizer.css">
</head>

<body>

    <div id="titlebar"></div>

    <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Open history sidebar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd"
                d="M3.5875 19.4125C3.97917 19.8042 4.45 20 5 20L19.0875 20C19.6375 20 20.1083 19.8042 20.5 19.4125C20.8917 19.0208 21.0875 18.55 21.0875 18V6C21.0875 5.45 20.8917 4.97917 20.5 4.5875C20.1083 4.19583 19.6375 4 19.0875 4H5C4.45 4 3.97917 4.19583 3.5875 4.5875C3.19583 4.97917 3 5.45 3 6V18C3 18.55 3.19583 19.0208 3.5875 19.4125ZM9 18H5V6H9V18ZM15 18H11V6H15H17L19.0875 6V18L17 18H15Z"
                fill="black" />
        </svg>
    </button>

    <div id="sidebarParts"></div>

    <div class="container">
        <!-- <h1 class="title">NORMALIZING</h1> -->
        <img src="./assets/logo/Normalizing.png" alt="Normalizing Fav Icons" class="title">

        <div class="flex-search-box">
            <textarea id="queryInput" rows="1" placeholder="Type here to search..." autocomplete="off"></textarea>

            <div class="menu-wrapper">
                <button class="menu-btn" id="menuBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="currentcolor">
                        <path
                            d="M480-160q-33 0-56.5-23.5T400-240q0-33 23.5-56.5T480-320q33 0 56.5 23.5T560-240q0 33-23.5 56.5T480-160Zm0-240q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm0-240q-33 0-56.5-23.5T400-720q0-33 23.5-56.5T480-800q33 0 56.5 23.5T560-720q0 33-23.5 56.5T480-640Z" />
                    </svg>
                </button>

                <div class="platforms hidden" id="platformMenu">
                    <button class="google" data-platform="google"
                        style="border-top-right-radius: 4px; border-top-left-radius: 4px;">Google</button>
                    <button class="youtube" data-platform="youtube">YouTube</button>
                    <button class="threads" data-platform="threads">Threads</button>
                    <button class="instagram" data-platform="instagram">Instagram</button>
                    <button class="facebook" data-platform="facebook">Facebook</button>
                    <button class="github" data-platform="github">GitHub</button>
                    <button class="pinterest" data-platform="pinterest"
                        style="border-bottom-right-radius: 4px; border-bottom-left-radius: 4px;">Pinterest</button>
                </div>
            </div>

        </div>
    </div>

    <p class="search-hint">
        Type your message and select your platform.
    </p>

    <script type="module" src="/src/renderer/app.ts"></script>
</body>

</html>
