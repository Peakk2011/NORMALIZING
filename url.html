<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Results</title>
    <link rel="stylesheet" href="/src/renderer/stylesheet/base.css">
    <link rel="stylesheet" href="/src/renderer/stylesheet/url.css">
</head>

<body>

    <div id="sidebarParts"></div>

    <div class="header">
        <div class="behave-buttons">
            <button class="back-btn" id="backBtn">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"
                    fill="currentcolor">
                    <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z" />
                </svg>
            </button>
            <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="Open history sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentcolor">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <input type="text" id="searchTitle" class="search-title" placeholder="Search or paste URL" autocomplete="off" />

        <div class="menu-wrapper">
            <button class="menu-btn urlpage" id="menuBtn">
                <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                    fill="currentcolor">
                    <path
                        d="M480-160q-33 0-56.5-23.5T400-240q0-33 23.5-56.5T480-320q33 0 56.5 23.5T560-240q0 33-23.5 56.5T480-160Zm0-240q-33 0-56.5-23.5T400-480q0-33 23.5-56.5T480-560q33 0 56.5 23.5T560-480q0 33-23.5 56.5T480-400Zm0-240q-33 0-56.5-23.5T400-720q0-33 23.5-56.5T480-800q33 0 56.5 23.5T560-720q0 33-23.5 56.5T480-640Z" />
                </svg>
            </button>

            <div class="platforms hidden" id="platformMenu">
                <button class="google" data-platform="google"
                    style="border-top-right-radius: 4px; border-top-left-radius: 4px;">Google</button>
                <button class="youtube" data-platform="youtube">YouTube</button>
                <button class="threads" data-platform="threads">Threads</button>
                <button class="instagram" data-platform="instagram">Instagram</button>
                <button class="facebook" data-platform="facebook">Facebook</button>
                <button class="github" data-platform="github">GitHub</button>
                <button class="pinterest" data-platform="pinterest"
                    style="border-bottom-right-radius: 4px; border-bottom-left-radius: 4px;">Pinterest</button>
            </div>
        </div>
    </div>

    <webview id="resultFrame" src="" partition="persist:search"></webview>

    <div id="webFallback" class="web-fallback hidden">
        <h2>Cannot Display Content in Browser</h2>
        <p id="fallbackMessage">
            This page cannot be embedded in a browser due to security restrictions.
            Click the button below to open the result in a new tab.
        </p>
        <button id="openInNewTab">Open in New Tab</button>
    </div>

    <script type="module" src="/src/renderer/url.ts"></script>
</body>

</html>
