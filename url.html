<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' http://127.0.0.1:5173 http://localhost:5173; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:5173 http://localhost:5173 ws://127.0.0.1:5173 ws://localhost:5173; media-src 'self' https: http:; object-src 'none'; base-uri 'self';" />
    <title>Search Results</title>
    <link rel="stylesheet" href="/src/renderer/stylesheet/base.css">
    <link rel="stylesheet" href="/src/renderer/stylesheet/url.css">
    <link rel="stylesheet" href="/src/visualizer/visualizer.css">
</head>

<body>

    <div id="sidebar-parts"></div>

    <div class="c-result-header">
        <div class="c-result-controls">
            <button class="c-back-btn" id="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"
                    fill="currentcolor">
                    <path d="M400-80 0-480l400-400 71 71-329 329 329 329-71 71Z" />
                </svg>
            </button>
            <button class="c-refresh-btn" id="refresh-btn" type="button" aria-label="Refresh current page">
                <svg xmlns="http://www.w3.org/2000/svg" height="18px" viewBox="0 -960 960 960" width="18px"
                    fill="currentcolor">
                    <path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 129 28.5T714-694v-106h80v280H514v-80h152q-35-55-88-87.5T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 138.5-42.5T704-400h84q-20 107-100 173.5T480-160Z" />
                </svg>
            </button>
            <button id="sidebar-toggle-btn" class="c-sidebar-toggle" type="button" aria-label="Open history sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentcolor">
                    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
        </div>

        <input type="text" id="search-title-input" class="c-search-title" placeholder="Search or paste URL" autocomplete="off" />

        <div class="c-url-actions">
        </div>
    </div>

    <webview id="result-frame" src="" partition="persist:search"></webview>

    <div id="web-fallback" class="c-web-fallback u-hidden">
        <h2>Cannot Display Content in Browser</h2>
        <p id="fallback-message">
            This page cannot be embedded in a browser due to security restrictions.
            Click the button below to open the result in a new tab.
        </p>
        <button id="open-in-new-tab">Open in New Tab</button>
    </div>

    <script type="module" src="/src/renderer/url.ts"></script>
</body>

</html>
